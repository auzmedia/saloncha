<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Glow & Style Salon</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#f8f5f2;
color:#222;
}

.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=1974&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.container{
width:100%;
max-width:1200px;
}

.hero-grid{
display:grid;
grid-template-columns:1fr 480px;
gap:50px;
align-items:center;
}

.hero-text h1{
font-size:64px;
color:#fff;
font-weight:800;
line-height:1.1;
margin-bottom:20px;
}

.hero-text p{
color:#eee;
font-size:18px;
line-height:1.8;
}

.booking-card{
background:#fff;
padding:35px;
border-radius:28px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.booking-card h2{
font-size:32px;
margin-bottom:10px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
select{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
}

.btn{
width:100%;
padding:18px;
border:none;
background:#d4a373;
color:#fff;
border-radius:16px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.btn:disabled{
background:#ccc;
}

#loadingStatus{
display:none;
margin-bottom:15px;
font-weight:700;
color:#d4a373;
text-align:center;
}

@media(max-width:980px){

.hero-grid{
grid-template-columns:1fr;
}

.hero-text{
text-align:center;
}

.hero-text h1{
font-size:48px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="container">

<div class="hero-grid">

<div class="hero-text">

<h1>
Glow & Style Salon
</h1>

<p>
Professional salon xizmatlari.
Online bron tizimi.
</p>

</div>

<div class="booking-card">

<h2>Bron qilish</h2>

<div id="loadingStatus">
Vaqtlar tekshirilmoqda...
</div>

<form id="bookingForm">

<div class="form-group">
<label>Ism</label>
<input type="text"
id="ism"
required>
</div>

<div class="form-group">
<label>Familiya</label>
<input type="text"
id="familiya"
required>
</div>

<div class="form-group">
<label>Telefon</label>
<input type="tel"
id="tel"
required>
</div>

<div class="form-group">
<label>Sana</label>
<input type="date"
id="sana"
required>
</div>

<div class="form-group">

<label>Bo‘sh vaqt</label>

<select id="vaqt"
required
disabled>

<option value="">
Oldin sanani tanlang
</option>

</select>

</div>

<button class="btn"
id="submitBtn"
disabled>

Band qilish

</button>

</form>

</div>

</div>

</div>

</section>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbwYBS3vpL_d3kC3SM_vTncLnvRFnaZV-qHegcTiX0Ju2WE3tVrwwRicwCEeYsDqLU0SQg/exec";

const sanaInput =
document.getElementById('sana');

const vaqtSelect =
document.getElementById('vaqt');

const submitBtn =
document.getElementById('submitBtn');

const loadingStatus =
document.getElementById('loadingStatus');

/* GMT+6 */

function getGMT6(){

const now = new Date();

const utc =
now.getTime()
+
(now.getTimezoneOffset() * 60000);

const gmt6 =
new Date(utc + (3600000 * 6));

return {

hour:gmt6.getHours(),

dateStr:
gmt6.toISOString().split('T')[0]

};

}

const currentNow =
getGMT6();

sanaInput.setAttribute(
'min',
currentNow.dateStr
);

/* SCHEDULE */

const grafik = {

1:{ start:8, end:20 },

2:{ start:9, end:21 },

3:{ start:10, end:22 },

4:{ start:11, end:23 },

5:null,

6:{ start:8, end:16 },

0:{ start:7, end:19 }

};

/* DATE CHANGE */

sanaInput.addEventListener(
'change',
async function(){

const selectedDate =
this.value;

if(!selectedDate) return;

const dayOfWeek =
new Date(selectedDate).getDay();

if(grafik[dayOfWeek] === null){

alert("Juma dam olish");

this.value='';

return;

}

loadingStatus.style.display =
"block";

vaqtSelect.innerHTML =
'<option>Yuklanmoqda...</option>';

vaqtSelect.disabled = true;

let bookedSlots = [];

try{

const response =
await fetch(
WEB_APP_URL,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"get_booked",
date:selectedDate
})
}
);

const data =
await response.json();

bookedSlots =
data.booked || [];

}catch(error){

console.log(error);

}

loadingStatus.style.display =
"none";

vaqtSelect.innerHTML =
'<option value="">Vaqtni tanlang</option>';

const liveNow =
getGMT6();

const isToday =
selectedDate === liveNow.dateStr;

const kunlikGrafik =
grafik[dayOfWeek];

for(
let h = kunlikGrafik.start;
h < kunlikGrafik.end;
h++
){

const slotTime =
(h < 10 ? '0'+h : h)
+
':00';

const option =
document.createElement('option');

option.value = slotTime;

const isBooked =
bookedSlots.includes(slotTime);

const isPast =
isToday &&
(h <= liveNow.hour);

if(isBooked){

option.textContent =
slotTime +
' - BAND ❌';

option.disabled = true;

}
else if(isPast){

option.textContent =
slotTime +
' - O‘TIB KETGAN ⏳';

option.disabled = true;

}
else{

option.textContent =
slotTime +
' - Bo‘sh ✅';

}

vaqtSelect.appendChild(option);

}

vaqtSelect.disabled = false;

submitBtn.disabled = false;

});

/* SUBMIT */

document
.getElementById('bookingForm')
.addEventListener(
'submit',
async function(e){

e.preventDefault();

submitBtn.disabled = true;

submitBtn.innerText =
"Yuborilmoqda...";

const formData = {

action:"book",

ism:
document.getElementById('ism').value,

familiya:
document.getElementById('familiya').value,

tel:
document.getElementById('tel').value,

sana:
sanaInput.value,

vaqt:
vaqtSelect.value

};

try{

await fetch(
WEB_APP_URL,
{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(formData)
}
);

alert(
"So‘rov yuborildi"
);

this.reset();

vaqtSelect.disabled = true;

}catch(error){

alert("Xatolik");

}

submitBtn.disabled = false;

submitBtn.innerText =
"Band qilish";

});

</script>

</body>
</html>
