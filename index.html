<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow & Style | Bron tizimi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #faf6f6; color: #333; padding: 20px; }
        .booking-section { background: #fff; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .btn { width: 100%; background: #d4a373; color: #fff; padding: 14px; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        #loadingStatus { text-align: center; color: #d4a373; display: none; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="booking-section">
        <h2 style="text-align:center; margin-bottom:20px;">Vaqtni Band Qilish</h2>
        <div id="loadingStatus">Tekshirilmoqda...</div>
        <form id="bookingForm">
            <div class="form-group"><label>Ism</label><input type="text" id="ism" required></div>
            <div class="form-group"><label>Familiya</label><input type="text" id="familiya" required></div>
            <div class="form-group"><label>Telefon</label><input type="tel" id="tel" required></div>
            <div class="form-group"><label>Sana</label><input type="date" id="sana" required></div>
            <div class="form-group">
                <label>Vaqt (GMT+6)</label>
                <select id="vaqt" required disabled><option value="">Sana tanlang...</option></select>
            </div>
            <button type="submit" class="btn" id="submitBtn" disabled>Yuborish</button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwYBS3vpL_d3kC3SM_vTncLnvRFnaZV-qHegcTiX0Ju2WE3tVrwwRicwCEeYsDqLU0SQg/exec";
        
        const sanaInput = document.getElementById('sana');
        const vaqtSelect = document.getElementById('vaqt');
        const submitBtn = document.getElementById('submitBtn');

        // GMT+6 vaqtini aniqlash
        function getGMT6Date() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 6));
        }

        const now6 = getGMT6Date();
        const todayStr = now6.toISOString().split('T')[0];
        sanaInput.setAttribute('min', todayStr);

        const grafik = {
            1: { start: 8, end: 20 }, 2: { start: 9, end: 21 }, 
            3: { start: 10, end: 22 }, 4: { start: 11, end: 23 }, 
            5: null, 6: { start: 8, end: 16 }, 0: { start: 7, end: 19 } 
        };

        sanaInput.addEventListener('change', async function() {
            const selectedDate = this.value;
            const dateObj = new Date(selectedDate);
            const day = dateObj.getDay();

            if (grafik[day] === null) {
                alert("Juma - dam olish kuni!");
                this.value = ''; return;
            }

            vaqtSelect.innerHTML = '<option value="">Yuklanmoqda...</option>';
            vaqtSelect.disabled = true;
            document.getElementById('loadingStatus').style.display = 'block';

            let booked = [];
            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "get_booked", date: selectedDate }) });
                const data = await res.json();
                booked = data.booked || [];
            } catch (e) { console.error(e); }

            document.getElementById('loadingStatus').style.display = 'none';
            vaqtSelect.innerHTML = '<option value="">Tanlang...</option>';

            const currentHour = getGMT6Date().getHours();
            const isToday = selectedDate === todayStr;
            const g = grafik[day];

            for (let h = g.start; h < g.end; h++) {
                let time = (h < 10 ? '0'+h : h) + ':00';
                let opt = document.createElement('option');
                opt.value = time;

                if (booked.includes(time)) {
                    opt.textContent = time + " - [BAND ❌]";
                    opt.disabled = true;
                } else if (isToday && h <= currentHour) {
                    opt.textContent = time + " - [O'TIB KETDI ⏳]";
                    opt.disabled = true;
                } else {
                    opt.textContent = time + " - Bo'sh ✅";
                }
                vaqtSelect.appendChild(opt);
            }
            vaqtSelect.disabled = false;
            submitBtn.disabled = false;
        });

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = "Yuborilmoqda...";
            
            const payload = {
                action: "book",
                ism: document.getElementById('ism').value,
                familiya: document.getElementById('familiya').value,
                tel: document.getElementById('tel').value,
                sana: sanaInput.value,
                vaqt: vaqtSelect.value
            };

            try {
                await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
                alert("Muvaffaqiyatli yuborildi!");
                this.reset();
                vaqtSelect.disabled = true;
            } catch (e) { alert("Xato yuz berdi!"); }
            
            submitBtn.textContent = "Yuborish";
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
